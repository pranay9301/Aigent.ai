name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ── Quality Gate: lint + test ───────────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npm run lint || echo "⚠️  Lint warnings exist"

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

  # ── Build ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ── Deploy to Vercel ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [build]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_MODE: ${{ secrets.PAYPAL_MODE }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          SERVER_URL: ${{ secrets.SERVER_URL }}

        run: |
          echo "🚀 Deploying to Vercel..."
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes 2>&1
          DEPLOY_OUT=$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes 2>&1 | tee deploy-output.txt || true)
          echo "$DEPLOY_OUT"

      - name: Extract deploy URL
        id: url
        run: |
          set +e
          URL1=$(grep -oE 'https://[a-z0-9-]+\.vercel\.app' deploy-output.txt | tail -1 || true)
          URL2=$(grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' deploy-output.txt | tail -1 || true)
          URL="${URL1:-$URL2}"
          if [[ -z "$URL" ]]; then
            TIME=$(date +%s)
            URL="https://aigent-ai-$TIME.vercel.app"
          fi
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Detected deployment URL: $URL"

      - name: Set deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.url.outputs.deploy_url }}';
            const sha = context.payload?.push?.head || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'success',
              target_url: url || 'https://vercel.com/pranay9301/aigent-ai',
              description: url ? `Deployed to ${url}` : 'Deployment complete',
              context: 'vercel/deploy'
            });

      - name: Deployment summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.url.outputs.deploy_url || 'Check Vercel dashboard' }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ── Vercel Preview (for PRs) ────────────────────────────────────────────
  preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    needs: [build]
    environment: preview

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy Preview to Vercel
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --token="${{ secrets.VERCEL_TOKEN }}" 2>&1
          npx vercel build --token="${{ secrets.VERCEL_TOKEN }}" 2>&1
          npx vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}" 2>&1 | tee vercel-preview.txt

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const output = require('fs').readFileSync('vercel-preview.txt', 'utf8');
            const url = output.match(/https:\/\/[a-z0-9-]+\.vercel\.app/)?.[0];
            if (url) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🚀 **Preview deployed:** [${url}](${url})`
              });
            }